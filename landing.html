<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hệ thống quản lý nhà hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --navy:  #060f22;
  --navy2: #0a1830;
  --blue:  #1a5cf8;
  --blue2: #2d7ef7;
  --glow:  rgba(29,94,248,.35);
  --line:  rgba(255,255,255,.07);
  --text:  rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.45);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ── GRID BG ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(29,94,248,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,94,248,.06) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* ── GLOW ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.orb1{width:500px;height:500px;background:rgba(29,94,248,.18);top:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:rgba(0,180,120,.12);bottom:-80px;right:-80px;}
.orb3{width:300px;height:300px;background:rgba(29,94,248,.1);bottom:20%;left:30%;}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  width:400px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:40px 36px 36px;
  backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(29,94,248,.15),
    0 32px 80px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.1);
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── LOGO ── */
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{
  width:auto;height:auto;
  margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
}
.logo-title{
  font-size:22px;font-weight:800;color:var(--text);
  letter-spacing:-.02em;line-height:1.1;
}
.logo-sub{
  font-size:12px;color:var(--muted);margin-top:4px;
  font-weight:500;letter-spacing:.06em;text-transform:uppercase;
}

/* ── DIVIDER ── */
.divider{
  height:1px;background:var(--line);margin-bottom:28px;
  position:relative;
}
.divider::after{
  content:'MÃ CÔNG TY';
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  background:var(--navy2);
  color:var(--muted);font-size:10px;font-weight:700;
  letter-spacing:.12em;padding:0 12px;white-space:nowrap;
}

/* ── INPUT ── */
.input-wrap{position:relative;margin-bottom:10px;}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:16px;pointer-events:none;opacity:.5;
}
input#companyCode{
  width:100%;height:48px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:10px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:18px;font-weight:500;
  text-align:center;letter-spacing:.12em;text-transform:uppercase;
  transition:all .2s;padding:0 16px;
}
input#companyCode::placeholder{
  font-family:'DM Sans',sans-serif;
  font-size:13px;letter-spacing:.02em;text-transform:none;
  color:rgba(255,255,255,.25);font-weight:400;
}
input#companyCode:focus{
  outline:none;
  border-color:var(--blue2);
  background:rgba(29,94,248,.08);
  box-shadow:0 0 0 3px rgba(29,94,248,.2);
}

/* ── HINT ── */
.hint{
  font-size:11.5px;color:var(--muted);text-align:center;
  margin-bottom:22px;line-height:1.5;
}
.hint span{
  color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;
  background:rgba(255,255,255,.07);padding:1px 7px;border-radius:4px;
  font-size:11px;
}

/* ── BUTTON ── */
button#btnGo{
  width:100%;height:48px;
  background:linear-gradient(135deg,var(--blue) 0%,#1e7de8 100%);
  color:#fff;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.01em;
  transition:all .2s;
  box-shadow:0 4px 20px var(--glow);
  position:relative;overflow:hidden;
}
button#btnGo::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .2s;
}
button#btnGo:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow);}
button#btnGo:hover::before{opacity:1;}
button#btnGo:active{transform:translateY(0);}

/* ── ERROR MSG ── */
#msg{
  text-align:center;font-size:12.5px;font-weight:500;
  min-height:18px;margin-top:12px;
  color:#f87171;
}

/* ── FOOTER ── */
.footer{
  text-align:center;margin-top:28px;
  font-size:11px;color:rgba(255,255,255,.2);
  letter-spacing:.04em;
}

/* ── RECENT COMPANIES ── */
.recent{margin-top:20px;}
.recent-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;text-align:center;}
.recent-list{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.recent-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.65);border-radius:6px;
  padding:4px 12px;font-size:11.5px;font-family:'DM Mono',monospace;
  font-weight:500;letter-spacing:.06em;cursor:pointer;transition:.18s;
}
.recent-btn:hover{background:rgba(29,94,248,.2);border-color:var(--blue2);color:#fff;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon" style="background:none;box-shadow:none;padding:0">
      <img src="icon-admin-192.png"
           alt="Logo công ty"
           id="eirLogoSlot"
           style="width:104px;height:104px;object-fit:contain;border-radius:18px;display:block;margin:0 auto">
    </div>
    <div class="logo-title">Kovenso</div>
    <div class="logo-sub">Hệ thống quản lý nhà hàng</div>
  </div>

  <div class="divider"></div>

  <div class="input-wrap">
    <input id="companyCode" type="text" placeholder="Nhập mã công ty của bạn..." autocomplete="off" spellcheck="false">
  </div>
  <div class="hint">
    Ví dụ: <span>NHAHANGA</span> &nbsp;·&nbsp; <span>CONGTY_B</span> &nbsp;·&nbsp; <span>QUANANC</span>
  </div>

  <button id="btnGo" onclick="goToLogin()">Tiếp tục →</button>
  <div id="msg"></div>

  <div class="recent" id="recentWrap" style="display:none">
    <div class="recent-label">Truy cập gần đây</div>
    <div class="recent-list" id="recentList"></div>
  </div>

  <div class="footer">© A·AU Platform · Hệ thống quản lý nhà hàng</div>
</div>

<script>
const RECENT_KEY = "RESTAURANT_RECENT_APPS";

// Load recent companies
(function(){
  const list = getRecent();
  if(list.length){
    document.getElementById("recentWrap").style.display="block";
    const ul = document.getElementById("recentList");
    list.forEach(app=>{
      const btn=document.createElement("button");
      btn.className="recent-btn"; btn.textContent=app;
      btn.onclick=()=>{ document.getElementById("companyCode").value=app; goToLogin(); };
      ul.appendChild(btn);
    });
  }
})();

function getRecent(){
  try{ return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]"); }
  catch{ return []; }
}
function saveRecent(app){
  let list=getRecent().filter(x=>x!==app);
  list.unshift(app);
  list=list.slice(0,5);
  localStorage.setItem(RECENT_KEY, JSON.stringify(list));
}

function goToLogin(){
  const raw = document.getElementById("companyCode").value.trim().toUpperCase();
  const msg = document.getElementById("msg");
  msg.textContent="";
  if(!raw){ msg.textContent="Vui lòng nhập mã công ty!"; return; }
  // Chỉ cho phép chữ, số, dấu _ và -
  if(!/^[A-Z0-9_\-]+$/.test(raw)){
    msg.textContent="Mã công ty chỉ gồm chữ, số, _ hoặc -";
    return;
  }
  saveRecent(raw);
  // Giữ toàn bộ query params hiện tại nếu có, chỉ thêm/thay app
  const params = new URLSearchParams(location.search);
  params.set("app", raw);
  location.href = `login.html?${params.toString()}`;
}

document.getElementById("companyCode").addEventListener("keydown", e=>{
  if(e.key==="Enter") goToLogin();
});
// Auto-focus
document.getElementById("companyCode").focus();

// Nếu URL đã có ?app= thì điền sẵn
const existingApp = new URLSearchParams(location.search).get("app");
if(existingApp) document.getElementById("companyCode").value=existingApp.toUpperCase();
</script>
</body>
</html>
