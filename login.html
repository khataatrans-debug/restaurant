<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập — A·AU TMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#060f22;--navy2:#0a1830;--blue:#1a5cf8;--blue2:#2d7ef7;--glow:rgba(29,94,248,.35);--line:rgba(255,255,255,.07);--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.45);--green:#00c27a;--red:#f87171;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(29,94,248,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(29,94,248,.05) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.orb1{width:500px;height:500px;background:rgba(29,94,248,.15);top:-120px;right:-80px;}
.orb2{width:400px;height:400px;background:rgba(0,180,120,.1);bottom:-80px;left:-80px;}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:10;display:flex;align-items:center;gap:60px;padding:20px;max-width:900px;width:100%;}

/* ── BRAND ── */
.brand{flex:1;min-width:0;animation:fadeLeft .7s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
.brand-logo{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.brand-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--blue),#0ea5e9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 32px var(--glow);flex-shrink:0;overflow:hidden;}
.brand-icon img{width:100%;height:100%;object-fit:contain;border-radius:50%;padding:6px;background:linear-gradient(135deg,var(--blue),#0ea5e9);}
.brand-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em;}
.brand-name-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}
.brand-title{font-size:34px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.03em;margin-bottom:12px;}
.brand-title span{background:linear-gradient(135deg,var(--blue2),#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-desc{font-size:14px;color:var(--muted);line-height:1.7;max-width:320px;}
.brand-tags{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:.04em;}

/* ── CARD ── */
.card{width:370px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 0 0 1px rgba(29,94,248,.15),0 32px 80px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);animation:fadeUp .6s .1s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── PANELS (login / change-pass / forgot) ── */
.panel{display:none;}
.panel.active{display:block;}

/* ── BADGE ── */
.app-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(29,94,248,.15);border:1px solid rgba(29,94,248,.3);color:var(--blue2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;margin-bottom:22px;letter-spacing:.04em;cursor:pointer;transition:.18s;}
.app-badge:hover{background:rgba(29,94,248,.25);}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.card-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.card-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px;}
#status{font-size:11.5px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
#status.ok{color:var(--green);}#status.err{color:#fbbf24;}

/* ── FIELDS ── */
.field{margin-bottom:14px;position:relative;}
.field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;height:44px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:0 44px 0 14px;transition:all .2s;}
.field input::placeholder{color:rgba(255,255,255,.22);font-size:13px;}
.field input:focus{outline:none;border-color:var(--blue2);background:rgba(29,94,248,.1);box-shadow:0 0 0 3px rgba(29,94,248,.2);}
.eye-btn{position:absolute;right:12px;bottom:11px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;line-height:1;}
.eye-btn:hover{color:var(--text);}

/* ── BUTTONS ── */
.btn-primary{width:100%;height:46px;margin-top:4px;background:linear-gradient(135deg,var(--blue),#1e7de8);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px var(--glow);}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px var(--glow);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{width:100%;height:42px;margin-top:8px;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.12);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:rgba(255,255,255,.25);color:var(--text);}

#msg{text-align:center;font-size:12.5px;font-weight:500;min-height:18px;margin-top:10px;color:var(--red);}
#msgCP{text-align:center;font-size:12px;min-height:16px;margin-top:8px;}
#msgFP{text-align:center;font-size:12px;min-height:16px;margin-top:8px;}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.divider span{font-size:11px;color:var(--muted);white-space:nowrap;}

.link-btn{background:none;border:none;color:var(--blue2);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;transition:.15s;}
.link-btn:hover{color:#fff;}

.back-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.back-row a,.back-row button{color:rgba(255,255,255,.4);font-size:12px;font-weight:600;text-decoration:none;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;}
.back-row a:hover,.back-row button:hover{color:var(--blue2);}

/* ── SUCCESS STATE ── */
.success-box{text-align:center;padding:12px 0;}
.success-icon{font-size:40px;margin-bottom:10px;}
.success-title{font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px;}
.success-sub{font-size:12.5px;color:var(--muted);line-height:1.6;}

/* ── STRENGTH BAR ── */
.strength-bar{height:3px;border-radius:2px;margin-top:6px;background:rgba(255,255,255,.1);overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:all .3s;width:0;}

@media(max-width:640px){
  .wrap{flex-direction:column;gap:30px;}
  .brand{text-align:center;}
  .brand-tags{justify-content:center;}
  .brand-desc{max-width:none;}
  .card{width:100%;}
  .brand-title{font-size:26px;}
}
</style>
</head>

      <button class="btn-outline" onclick="showPanel('panelLogin')">← Quay lại đăng nhập</button>
    </div>



  </div>
</div>

<script src="app-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const APP_ID      = new URLSearchParams(location.search).get("app") || "";
const USERS_REF   = APP_ID ? `app_users_${APP_ID}` : "app_users";
const LOCAL_USERS = `app_users_${APP_ID||"default"}`;
const MASTER_REF  = APP_ID ? `master_data_${APP_ID}` : "master_data";
const CURRENT_KEY = "LOGIN_USER";

if(!APP_ID){ location.href="landing.html"; }

document.getElementById("appName").textContent  = APP_ID;
document.title = `Đăng nhập — A·AU TMS`;

firebase.initializeApp({
  apiKey:"AIzaSyAPmHlNgx-w5KfK4LF490pvdYA_mGgcX_k",
  authDomain:"transportation-6d6f5.firebaseapp.com",
  projectId:"transportation-6d6f5",
  databaseURL:"https://transportation-6d6f5-default-rtdb.asia-southeast1.firebasedatabase.app",
  storageBucket:"transportation-6d6f5.firebasestorage.app",
  messagingSenderId:"1097685849973",
  appId:"1:1097685849973:web:79ad636e3dfd0b12f7653c"
});
const db = firebase.database();
let _users = [];

// ── SHA-256 hash password ──
async function hashPass(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Rate limiting: max 5 lần sai / 5 phút ──
function checkRateLimit(user){
  const key = "rl_"+APP_ID+"_"+user;
  const data = JSON.parse(sessionStorage.getItem(key)||"{}");
  const now = Date.now();
  if(data.lockUntil && now < data.lockUntil){
    const wait = Math.ceil((data.lockUntil-now)/1000);
    return {locked:true, wait};
  }
  return {locked:false, count:data.count||0, first:data.first||now};
}
function recordFail(user){
  const key = "rl_"+APP_ID+"_"+user;
  const data = JSON.parse(sessionStorage.getItem(key)||"{}");
  const now = Date.now();
  const count = (data.count||0)+1;
  if(count>=5){ sessionStorage.setItem(key,JSON.stringify({lockUntil:now+5*60*1000})); }
  else { sessionStorage.setItem(key,JSON.stringify({count,first:data.first||now})); }
}
function clearRateLimit(user){
  sessionStorage.removeItem("rl_"+APP_ID+"_"+user);
}

// ── Audit log ──
async function writeAuditLog(action, detail, username){
  try{
    await db.ref("audit_log_"+APP_ID).push({
      action, detail, username:username||"?",
      ip: "client", at: new Date().toISOString(),
      ua: navigator.userAgent.slice(0,80)
    });
  }catch(e){}
}

/* ── LOAD USERS ── */
db.ref(USERS_REF).on("value", snap => {
  const val = snap.exists() ? snap.val() : [];
  _users = Array.isArray(val) ? val : Object.values(val||{});
  localStorage.setItem(LOCAL_USERS, JSON.stringify(_users));
  document.getElementById("btnLogin").disabled = false;
  const st = document.getElementById("status");
  st.textContent = "✅ Sẵn sàng";
  st.className = "ok";
}, () => {
  _users = JSON.parse(localStorage.getItem(LOCAL_USERS)||"[]");
  document.getElementById("btnLogin").disabled = _users.length === 0;
  const st = document.getElementById("status");
  st.textContent = _users.length ? "⚠️ Dùng data cục bộ" : "❌ Không kết nối được";
  st.className = "err";
});

/* ── LOAD LOGO CÔNG TY TỪ MASTER ── */
/* Logo & tên A·AU cố định — không bị ghi đè bởi dữ liệu công ty trong Firebase */

/* ── PANEL SWITCH ── */
function showPanel(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ── LOGIN ── */
async function login(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btnLogin");
  msg.textContent="";
  if(!u||!p){ msg.textContent="Vui lòng nhập đầy đủ thông tin!"; return; }

  // ── Rate limiting ──
  const rl = checkRateLimit(u);
  if(rl.locked){
    msg.textContent=`⛔ Đăng nhập bị tạm khóa. Thử lại sau ${rl.wait} giây.`;
    return;
  }

  btn.disabled=true; btn.textContent="Đang xác thực...";

  // ── So sánh password (hỗ trợ cả plain và hash) ──
  const hashed = await hashPass(p);
  const found = _users.find(x=>x.username===u && (x.password===p || x.password===hashed));

  if(!found){
    recordFail(u);
    const rl2 = checkRateLimit(u);
    const remain = 5 - (rl2.count||0);
    msg.textContent = remain>0
      ? `Sai tên đăng nhập hoặc mật khẩu! (còn ${remain} lần thử)`
      : "⛔ Quá 5 lần sai — tạm khóa 5 phút!";
    btn.disabled=false; btn.textContent="Đăng nhập";
    writeAuditLog("LOGIN_FAIL", "Sai mật khẩu", u);
    return;
  }

  clearRateLimit(u);
  writeAuditLog("LOGIN_OK", "Đăng nhập thành công", u);
  localStorage.setItem(CURRENT_KEY, JSON.stringify({username:found.username,role:found.role,pages:found.pages||[],appId:APP_ID}));
  const params = new URLSearchParams(location.search);
  if(found.role==="admin"||found.role==="viceadmin"){
    location.href=`index.html?${params}`;
  } else if(found.role==="driver"){
    location.href=`driver.html?${params}`;
  } else {
    const first=found.pages&&found.pages[0];
    location.href=first?`${first}?${params}`:`login.html?${params}`;
  }
}

/* ── ĐỔI MẬT KHẨU ── */
async function doChangePass(){
  const u   = document.getElementById("cp-user").value.trim();
  const old = document.getElementById("cp-old").value.trim();
  const np  = document.getElementById("cp-new").value.trim();
  const np2 = document.getElementById("cp-new2").value.trim();
  const msg = document.getElementById("msgCP");
  
  if(!u||!old||!np||!np2){ setMsg("msgCP","⚠️ Vui lòng nhập đầy đủ!","#fbbf24"); return; }
  if(np.length<4){ setMsg("msgCP","⚠️ Mật khẩu mới phải từ 4 ký tự!","#fbbf24"); return; }
  if(np!==np2){ setMsg("msgCP","⚠️ Mật khẩu nhập lại không khớp!","#fbbf24"); return; }
  // Hỗ trợ cả plain text và hash SHA-256 cũ
  const oldHashed = await hashPass(old);
  const idx = _users.findIndex(x=>x.username===u && (x.password===old || x.password===oldHashed));
  if(idx===-1){ setMsg("msgCP","❌ Sai tên đăng nhập hoặc mật khẩu hiện tại!","var(--red)"); return; }
  // Lưu plain text (bỏ hash)
  const updated = [..._users];
  updated[idx] = {...updated[idx], password: np};
  db.ref(USERS_REF).set(updated).then(()=>{
    _users = updated;
    localStorage.setItem(LOCAL_USERS, JSON.stringify(_users));
    setMsg("msgCP","✅ Đổi mật khẩu thành công! Đang về đăng nhập...","var(--green)");
    setTimeout(()=>showPanel("panelLogin"),1800);
  }).catch(e=>setMsg("msgCP","❌ Lỗi: "+e.message,"var(--red)"));
}

/* ── QUÊN MẬT KHẨU ── */
function loadAdminContact(){
  const list = document.getElementById("adminContactList");
  const admins = _users.filter(u=>u.role==="admin"||u.role==="viceadmin");
  if(!admins.length){ list.textContent="Không tìm thấy admin. Vui lòng liên hệ hỗ trợ kỹ thuật."; return; }
  list.innerHTML = admins.map(a=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
    <span style="color:${a.role==="admin"?"#60a5fa":"#fbbf24"};font-size:11px;font-weight:700">${a.role==="admin"?"👑 Admin":"⭐ Phó Admin"}</span>
    <span style="color:var(--text);font-weight:600">${a.username}</span>
  </div>`).join("");
  // Link reset cho admin
  const base = location.origin+location.pathname.replace("login.html","");
  document.getElementById("resetLink").textContent = `${base}users.html?app=${APP_ID}`;
}

/* ── HELPERS ── */
function setMsg(id,txt,color){
  const el=document.getElementById(id);
  el.textContent=txt; el.style.color=color;
}
function toggleEye(inputId, btn){
  const inp=document.getElementById(inputId);
  if(inp.type==="password"){ inp.type="text"; btn.textContent="🙈"; }
  else{ inp.type="password"; btn.textContent="👁️"; }
}
function checkStrength(inp, barId){
  const v=inp.value;
  const bar=document.getElementById(barId);
  let score=0;
  if(v.length>=4) score++;
  if(v.length>=8) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[A-Z]/.test(v)||/[!@#$%]/.test(v)) score++;
  const colors=["#ef4444","#f59e0b","#22c55e","#0ea5e9"];
  const widths=["25%","50%","75%","100%"];
  bar.style.background=colors[score-1]||"rgba(255,255,255,.1)";
  bar.style.width=score>0?widths[score-1]:"0";
}
document.addEventListener("keydown",e=>{ if(e.key==="Enter"){ const active=document.querySelector(".panel.active"); if(active.id==="panelLogin") login(); else if(active.id==="panelChange") doChangePass(); }});
document.getElementById("username").focus();
</script>
</body>
