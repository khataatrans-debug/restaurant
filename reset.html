<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔧 Reset khẩn cấp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root {
  --navy:   #0d2248;
  --accent: #1d6ef5;
  --border: #e2e8f5;
  --bg:     #eef1f8;
  --white:  #ffffff;
  --text:   #0f172a;
  --shadow: 0 1px 3px rgba(13,34,72,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Be Vietnam Pro','Segoe UI',Arial,sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

/* ── NAV ── */
.nav { background: var(--navy); display: flex; align-items: center; padding: 0 18px; height: 46px; gap: 2px; box-shadow: 0 2px 8px rgba(13,34,72,.3); }
.nav a { color: rgba(255,255,255,.6); text-decoration: none; font-size: 12.5px; font-weight: 500; padding: 5px 12px; border-radius: 5px; transition: .15s; white-space: nowrap; }
.nav a:hover { background: rgba(255,255,255,.1); color: #fff; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.nav-user { color: rgba(255,255,255,.75); font-size: 12px; font-weight: 500; }
.btn-nav-logout { background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.15); border-radius: 5px; padding: 4px 11px; font-size: 12px; font-family: inherit; cursor: pointer; }
.btn-nav-logout:hover { background: rgba(255,255,255,.2); color: #fff; }

/* ── CENTER CARD ── */
.center { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 46px); padding: 24px; }
.box { background: var(--white); padding: 32px; border-radius: 12px; box-shadow: 0 4px 24px rgba(13,34,72,.12); width: 420px; border: 1px solid var(--border); }
.box-header { text-align: center; margin-bottom: 24px; }
.box-header h3 { color: #dc2626; font-size: 17px; margin-bottom: 6px; }
.box-header p { color: #6b7280; font-size: 13px; }

/* ── SECTION ── */
.section { margin-bottom: 12px; }
.section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }

/* ── BUTTONS ── */
.btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; margin-bottom: 8px; border: none; border-radius: 8px; font-size: 13.5px; font-weight: 600; font-family: inherit; cursor: pointer; transition: .15s; }
.btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-blue  { background: var(--accent); color: #fff; }
.btn-green { background: #16a34a; color: #fff; }
.btn-gray  { background: #6b7280; color: #fff; }
.btn-red   { background: #dc2626; color: #fff; }

hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ── RESULT ── */
.result { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; }
.result.ok  { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.result.err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
</style>
<script src="app-config.js"></script>
</head>
<body>

<!-- NAV — luôn hiển thị, không cần login -->
<nav class="nav" id="mainNav">
  <div class="nav-right">
    <span class="nav-user" id="userInfo"></span>
    <button class="btn-nav-logout" id="btnLogout" style="display:none">↩ Đăng xuất</button>
  </div>
</nav>

<div class="center">
  <div class="box">
    <div class="box-header">
      <h3>🔧 Reset khẩn cấp</h3>
      <p>Dùng khi bị kẹt không vào được trang nào</p>
    </div>

    <!-- NHÓM 1: Sửa nhanh -->
    <div class="section">
      <div class="section-label">⚡ Sửa nhanh</div>
      <button class="btn btn-blue" onclick="fixAdminPages()">
        ✅ Cấp đủ quyền cho Admin
      </button>
      <button class="btn btn-gray" onclick="clearSession()">
        🔄 Xóa session → Về trang Login
      </button>
    </div>

    <hr>

    <!-- NHÓM 2: Nguy hiểm -->
    <div class="section">
      <div class="section-label">⚠️ Thao tác nguy hiểm</div>
      <button class="btn btn-green" onclick="resetUsers()">
        👤 Reset chỉ Users (giữ data trucking)
      </button>
      <button class="btn btn-red" onclick="resetAll()">
        🗑️ Reset TOÀN BỘ (xóa hết data)
      </button>
    </div>

    <div class="result" id="result"></div>
  </div>
</div>

<script>
const USERS_KEY   = "app_users";
const CURRENT_KEY = "LOGIN_USER";
const ALL_PAGES   = ["index.html","accountant.html","performance.html","overview.html","users.html"];

/* ── NAV: hiển thị user nếu đang login ── */
(function() {
  const raw = localStorage.getItem(CURRENT_KEY);
  const session = raw ? JSON.parse(raw) : null;
  if (session) {
    document.getElementById("userInfo").textContent = `👤 ${session.username}`;
    document.getElementById("btnLogout").style.display = "inline-block";
    document.getElementById("btnLogout").onclick = () => {
      localStorage.removeItem(CURRENT_KEY); navigate("login.html");
    };
    // Build nav links theo quyền
    const ALL_NAV = [
      { page: "index.html",       label: "🚚 Trucking" },
      { page: "accountant.html",  label: "📒 Accountant" },
      { page: "performance.html", label: "📈 Performance" },
      { page: "overview.html",    label: "📊 Overview" },
      { page: "master.html",      label: "📂 Master",  adminOnly: true },
      { page: "users.html",       label: "👑 Users",   adminOnly: true },
    ];
    const nav = document.getElementById("mainNav");
    const navRight = nav.querySelector(".nav-right");
    ALL_NAV.forEach(item => {
      if (item.adminOnly && session.role !== "admin") return;
      if (!item.adminOnly && session.role !== "admin" &&
          !(session.pages || []).includes(item.page)) return;
      const a = document.createElement("a");
      a.href = item.page; a.textContent = item.label;
      nav.insertBefore(a, navRight);
    });
  }
})();

function show(msg, ok = true) {
  const el = document.getElementById("result");
  el.textContent = msg;
  el.className = "result " + (ok ? "ok" : "err");
  el.style.display = "block";
}

async function hashPwd(pwd) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ── Cấp đủ quyền cho admin ── */
function fixAdminPages() {
  try {
    let users = JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
    if (!users.length) { show("Không có user nào. Hãy dùng Reset Users.", false); return; }
    let fixed = 0;
    users.forEach(u => { if (u.role === "admin") { u.pages = [...ALL_PAGES]; fixed++; } });
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    localStorage.removeItem(CURRENT_KEY);
    show(`✅ Đã cấp đủ quyền cho ${fixed} admin. Đang về login...`);
    setTimeout(() => navigate("login.html"), 1500);
  } catch(e) { show("Lỗi: " + e.message, false); }
}

/* ── Xóa session ── */
function clearSession() {
  localStorage.removeItem(CURRENT_KEY);
  show("✅ Đã xóa session. Đang về login...");
  setTimeout(() => navigate("login.html"), 1200);
}

/* ── Reset chỉ users (giữ data trucking + master) ── */
async function resetUsers() {
  if (!confirm("Reset users về mặc định?\n(Data trucking & master giữ nguyên)")) return;
  try {
    const defaults = [
      { username:"admin",  password:"123456", role:"admin",  pages:[...ALL_PAGES] },
      { username:"kevin",  password:"123456", role:"user",   pages:["accountant.html","performance.html"] },
      { username:"vantai", password:"123456", role:"user",   pages:["index.html"] },
    ];
    const hashed = await Promise.all(defaults.map(async u => ({
      ...u, password: await hashPwd(u.password), passwordPlain: u.password
    })));
    localStorage.setItem(USERS_KEY, JSON.stringify(hashed));
    localStorage.removeItem(CURRENT_KEY);
    show("✅ Reset users xong! admin/123456. Đang về login...");
    setTimeout(() => navigate("login.html"), 1800);
  } catch(e) { show("Lỗi: " + e.message, false); }
}

/* ── Reset toàn bộ ── */
async function resetAll() {
  if (!confirm("⚠️ XÓA TOÀN BỘ data (users + trucking + master)?\nThao tác KHÔNG THỂ hoàn tác!")) return;
  if (!confirm("Xác nhận lần 2: Chắc chắn muốn xóa hết?")) return;
  try {
    // Xóa tất cả localStorage
    localStorage.clear();
    // Tạo lại users mặc định
    const defaults = [
      { username:"admin",  password:"123456", role:"admin",  pages:[...ALL_PAGES] },
      { username:"kevin",  password:"123456", role:"user",   pages:["accountant.html","performance.html"] },
      { username:"vantai", password:"123456", role:"user",   pages:["index.html"] },
    ];
    const hashed = await Promise.all(defaults.map(async u => ({
      ...u, password: await hashPwd(u.password), passwordPlain: u.password
    })));
    localStorage.setItem(USERS_KEY, JSON.stringify(hashed));
    show("✅ Reset toàn bộ xong! admin/123456. Đang về login...");
    setTimeout(() => navigate("login.html"), 1800);
  } catch(e) { show("Lỗi: " + e.message, false); }
}
</script>
</body>
</html>
